<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ops AI — Worker Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        nav {
            background: #1a73e8;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        nav .brand { font-size: 1.3rem; font-weight: 600; }
        nav .brand span { color: #ffd700; }
        nav .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: background 0.2s;
        }
        nav .nav-links a:hover { background: rgba(255,255,255,0.15); }
        .container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .card h2 { margin-bottom: 1rem; color: #1a73e8; }
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: end;
        }
        .controls .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .controls .control-group label { font-size: 0.85rem; font-weight: 600; color: #555; }
        .controls select {
            padding: 0.55rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            min-width: 140px;
            background: white;
        }
        .controls select:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }
        .btn {
            display: inline-block;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-success { background: #34a853; color: white; }
        .btn-success:hover { background: #1e7e34; }
        .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.82rem; }
        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-info { background: #e8f0fe; color: #1a73e8; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 600px;
        }
        table th {
            background: #1a73e8;
            color: white;
            padding: 0.6rem 0.5rem;
            text-align: center;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid #1557b0;
        }
        table td {
            padding: 0.5rem;
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        table tr:nth-child(even) { background: #f8f9fa; }
        table tr:hover { background: #e8f0fe; }
        table .total-row { background: #e8f0fe !important; font-weight: 600; }
        table .absent-cell { background: #fce8e6; color: #d93025; font-weight: 600; }
        table .absent-row td { background: #fce8e6; }
        table td:first-child { font-weight: 500; text-align: left; padding-left: 0.8rem; white-space: nowrap; }
        .source-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        .source-live { background: #e6f4ea; color: #1e7e34; }
        .source-archived { background: #fef7e0; color: #ea8600; }
        .source-none { background: #f0f0f0; color: #888; }
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 0.5rem; text-align: center; }
            .controls { flex-direction: column; }
            .controls select { min-width: 100%; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand">Admin Ops <span>AI</span> — Worker Dashboard</div>
        <div class="nav-links">
            <a href="/admin">Admin Panel</a>
        </div>
    </nav>
    <div class="container">
        <div class="alert alert-info" id="status-msg">
            Loading production data...
        </div>
        <div class="card">
            <div class="controls">
                <div class="control-group">
                    <label for="worker-select">Worker</label>
                    <select id="worker-select" onchange="loadData()"></select>
                </div>
                <div class="control-group">
                    <label for="month-select">Month</label>
                    <select id="month-select" onchange="loadData()"></select>
                </div>
                <div class="control-group">
                    <label for="year-select">Year</label>
                    <select id="year-select" onchange="loadData()"></select>
                </div>
                <div style="align-self: end;">
                    <button class="btn btn-success btn-sm" id="download-excel" onclick="downloadExcel()">Download Excel</button>
                </div>
            </div>
        </div>
        <div class="card">
            <h2 id="table-title" style="display: flex; align-items: center; gap: 0.5rem;">
                Production Report
            </h2>
            <span id="source-badge" class="source-badge source-none" style="margin-left: 1.5rem; margin-bottom: 0.5rem; display: inline-block;"></span>
            <div id="table-container" class="table-wrap">
                <p style="color: #888; padding: 1rem;">Select a worker and month to view data.</p>
            </div>
        </div>
    </div>
    <script>
        const PRODUCT_CODES = [];

        async function loadWorkers() {
            const res = await fetch('/api/workers');
            const data = await res.json();
            const sel = document.getElementById('worker-select');
            sel.innerHTML = '';
            for (const w of data.workers) {
                const opt = document.createElement('option');
                opt.value = w.name;
                opt.textContent = w.name;
                sel.appendChild(opt);
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                const codes = data.products.map(p => p.code);
                PRODUCT_CODES.length = 0;
                PRODUCT_CODES.push(...codes);
            } catch (e) {
                console.error('loadProducts failed:', e);
            }
        }

        function setupMonthYearSelectors() {
            const now = new Date();
            const mSel = document.getElementById('month-select');
            mSel.innerHTML = '';
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = new Date(2000, m - 1, 1).toLocaleString('en', { month: 'long' });
                mSel.appendChild(opt);
            }
            mSel.value = now.getMonth() + 1;

            const ySel = document.getElementById('year-select');
            ySel.innerHTML = '';
            for (let y = now.getFullYear(); y >= 2026; y--) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                ySel.appendChild(opt);
            }
            ySel.value = now.getFullYear();
        }

        async function loadData() {
            const worker = document.getElementById('worker-select').value;
            const month = document.getElementById('month-select').value;
            const year = document.getElementById('year-select').value;
            const msg = document.getElementById('status-msg');
            const container = document.getElementById('table-container');
            const title = document.getElementById('table-title');
            const badge = document.getElementById('source-badge');
            const dlBtn = document.getElementById('download-excel');

            if (!worker) {
                container.innerHTML = '<p style="color: #888; padding: 1rem;">Select a worker to view data.</p>';
                return;
            }

            msg.textContent = 'Loading...';
            msg.className = 'alert alert-info';

            try {
                const res = await fetch(`/api/worker/${encodeURIComponent(worker)}/month/${year}/${month}`);
                if (!res.ok) {
                    const errBody = await res.text();
                    throw new Error(`HTTP ${res.status}: ${errBody}`);
                }
                const data = await res.json();

                badge.className = 'source-badge';
                title.innerHTML = `Production Report — ${worker}`;

                if (data.source === 'live') {
                    badge.textContent = 'Live (Current Month)';
                    badge.className = 'source-badge source-live';
                } else if (data.source === 'archived') {
                    badge.textContent = 'Archived';
                    badge.className = 'source-badge source-archived';
                } else {
                    badge.textContent = 'No Data';
                    badge.className = 'source-badge source-none';
                }

                const hasPresent = data.days.some(d => d.status === 'present');
                if (!hasPresent) {
                    const dayCount = data.days.length;
                    container.innerHTML = `<p style="color: #888; padding: 1rem;">No production recorded for ${worker} in ${year}-${String(month).padStart(2, '0')} (${dayCount} days, all empty or absent).</p>`;
                    msg.textContent = 'No data found.';
                    msg.className = 'alert alert-success';
                    dlBtn.disabled = true;
                    dlBtn.style.opacity = '0.5';
                    return;
                }

                dlBtn.disabled = false;
                dlBtn.style.opacity = '1';

                const headers = ['Date', ...PRODUCT_CODES];
                let html = '<table>';
                html += '<thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
                html += '<tbody>';

                let grandTotals = {};
                for (const code of PRODUCT_CODES) grandTotals[code] = 0;

                for (const day of data.days) {
                    if (day.status === 'absent') {
                        html += `<tr class="absent-row"><td>${day.date}</td>`;
                        html += `<td colspan="${PRODUCT_CODES.length}" class="absent-cell">ABSENT</td></tr>`;
                        continue;
                    }
                    html += '<tr>';
                    html += `<td>${day.date}</td>`;
                    const prods = day.products || {};
                    for (const code of PRODUCT_CODES) {
                        const qty = prods[code] || 0;
                        html += `<td>${qty}</td>`;
                        grandTotals[code] += qty;
                    }
                    html += '</tr>';
                }

                html += `<tr class="total-row"><td><strong>TOTAL</strong></td>`;
                for (const code of PRODUCT_CODES) {
                    html += `<td><strong>${grandTotals[code]}</strong></td>`;
                }
                html += '</tr>';
                html += '</tbody></table>';
                container.innerHTML = html;

                msg.textContent = `Showing ${data.days.length} days for ${worker} in ${year}-${String(month).padStart(2, '0')}`;
                msg.className = 'alert alert-success';
            } catch (e) {
                console.error('loadData error:', e);
                const errMsg = e.message || 'Unknown error';
                container.innerHTML = `<p style="color: #d93025; padding: 1rem;">Error: ${errMsg}</p>`;
                msg.textContent = 'Failed to load data.';
                msg.className = 'alert alert-info';
            }
        }

        function downloadExcel() {
            const worker = document.getElementById('worker-select').value;
            const month = document.getElementById('month-select').value;
            const year = document.getElementById('year-select').value;
            if (!worker) return;
            window.location.href = `/api/worker/${encodeURIComponent(worker)}/excel/${year}/${month}`;
        }

        async function init() {
            await loadWorkers();
            await loadProducts();
            setupMonthYearSelectors();
            await loadData();
        }
        document.addEventListener('DOMContentLoaded', init);

        setInterval(() => {
            if (document.hidden) return;
            loadData();
        }, 15000);
    </script>
</body>
</html>
